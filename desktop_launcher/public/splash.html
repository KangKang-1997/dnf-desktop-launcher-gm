<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>地下城与勇士</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      body {
        display: grid;
        place-items: center;
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Segoe UI",
          sans-serif;
      }

      .splash {
        display: grid;
        justify-items: center;
        -webkit-app-region: drag;
      }

      .splash img {
        width: 153px;
        height: 112px;
        object-fit: contain;
        filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.45));
        pointer-events: none;
      }

    </style>
  </head>
  <body>
    <main class="splash" aria-label="地下城与勇士">
      <img src="/assets/logo.png" alt="地下城与勇士" />
    </main>
  </body>
</html>
